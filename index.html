<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Get Well Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a0714;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── MOBILE: true full-bleed ── */
  .stage {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #0e030a;
    overflow: hidden;
  }

  .portrait-frame {
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  /* ── DESKTOP: centred portrait card ── */
  @media (min-width: 600px) {
    body { background: #0e030a; }
    .stage {
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
    }
    .portrait-frame {
      width: min(420px, 94vw);
      height: min(748px, 96vh);
      border-radius: 28px;
      box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(235,133,183,.15);
    }
  }

  /* ── Carousel ── */
  .carousel-track {
    position: absolute; inset: 0; display: flex;
    transition: transform .45s cubic-bezier(.25,.46,.45,.94);
    will-change: transform;
  }
  .carousel-slide {
    flex: 0 0 100%; width: 100%; height: 100%;
    background-size: cover; background-position: center; background-repeat: no-repeat;
  }
  .slide-1 { background: linear-gradient(160deg,#2e0a1e 0%,#7a1f4a 45%,#c2185b 80%,#e91e8c 100%); }
  .slide-2 { background: linear-gradient(160deg,#1a0714 0%,#5c1238 40%,#9c2762 75%,#c2185b 100%); }
  .slide-3 { background: linear-gradient(160deg,#120510 0%,#4a0e30 45%,#8b1a55 80%,#d81b7a 100%); }
  .slide-pattern {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(235,133,183,.14) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(194,24,91,.18) 0%, transparent 50%);
    pointer-events: none;
  }
  .carousel-overlay {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: linear-gradient(170deg,rgba(38,5,22,.45) 0%,rgba(72,8,40,.2) 45%,rgba(38,5,22,.5) 100%);
  }

  /* ── Controls ── */
  .swipe-arrow {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 20;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    color: #fff; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: .7; transition: opacity .2s, background .2s;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .swipe-arrow:hover { background: rgba(255,255,255,.22); opacity: 1; }
  .swipe-arrow.left  { left: 12px; }
  .swipe-arrow.right { right: 12px; }

  .dot-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 6px; align-items: center;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 4px;
    background: rgba(255,255,255,.32); border: none; cursor: pointer;
    transition: background .3s, width .3s; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .dot.active { background: rgba(255,255,255,.92); width: 18px; }

  .slide-counter {
    position: absolute; top: 14px; right: 14px; z-index: 20;
    background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.18);
    color: rgba(255,255,255,.85); font-size: .7rem;
    padding: 3px 10px; border-radius: 99px; letter-spacing: .05em;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }

  /* ── Particles ── */
  .floaters, .bubbles { position: absolute; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; }
  .floater { position: absolute; animation: floatRotate linear infinite; opacity: .12; }
  @keyframes floatRotate {
    0%  { transform: rotate(0deg) translateY(0); }
    25% { transform: rotate(90deg) translateY(-12px); }
    50% { transform: rotate(180deg) translateY(0); }
    75% { transform: rotate(270deg) translateY(12px); }
    100%{ transform: rotate(360deg) translateY(0); }
  }
  .bubble { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
  @keyframes floatUp {
    0%  { transform: translateY(110%) scale(.6); opacity: 0; }
    10% { opacity: .16; }
    90% { opacity: .07; }
    100%{ transform: translateY(-80px) scale(1); opacity: 0; }
  }

  /* ── Card ── */
  .card-wrap {
    position: absolute; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    padding: 56px 18px 44px; pointer-events: none;
  }
  .card {
    pointer-events: all; width: 100%; max-width: 340px;
    background: rgba(16,2,11,.32);
    border: 1px solid rgba(235,133,183,.38); border-radius: 22px;
    padding: 26px 22px 20px; text-align: center;
    animation: fadeIn .9s ease both;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .icon-top {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(145deg,#9c2762,#e91e8c);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px;
    animation: pulse 3s ease-in-out infinite;
    box-shadow: 0 4px 18px rgba(194,24,91,.4);
  }
  @keyframes pulse {
    0%,100%{ transform: scale(1); box-shadow: 0 4px 18px rgba(194,24,91,.4); }
    50%    { transform: scale(1.07); box-shadow: 0 6px 26px rgba(194,24,91,.65); }
  }
  .icon-top svg { width: 22px; height: 22px; fill: #fff; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.45rem, 5.5vw, 2rem);
    color: #fff; margin-bottom: 2px; line-height: 1.2; letter-spacing: -.01em;
  }
  .subtitle {
    font-size: clamp(.58rem, 2.2vw, .68rem); color: rgba(255,255,255,.82);
    font-weight: 500; letter-spacing: .14em; text-transform: uppercase; margin-bottom: 10px;
  }
  .divider {
    height: 1px; margin-bottom: 10px;
    background: linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
  }
  .message {
    font-size: clamp(.76rem, 2.8vw, .86rem); line-height: 1.78;
    color: rgba(255,255,255,.93); font-weight: 300; margin-bottom: 14px; transition: opacity .4s;
  }
  .message em { color: #fff; font-style: italic; font-family: 'Playfair Display', serif; }

  .btn-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }

  .hug-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: linear-gradient(135deg,#9c2762,#e91e8c);
    color: #fce4ec; border: none; border-radius: 50px;
    padding: 11px 26px; font-family: 'DM Sans', sans-serif;
    font-size: clamp(.78rem, 2.8vw, .88rem); font-weight: 500;
    cursor: pointer; min-height: 46px; letter-spacing: .02em;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 4px 16px rgba(194,24,91,.45);
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .hug-btn:active { transform: scale(.97); }

  .outline-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: transparent; color: rgba(255,255,255,.9);
    border: 1px solid rgba(255,255,255,.4); border-radius: 50px;
    padding: 9px 20px; font-family: 'DM Sans', sans-serif;
    font-size: clamp(.7rem, 2.4vw, .78rem); font-weight: 400;
    cursor: pointer; min-height: 40px;
    transition: background .2s, border-color .2s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .outline-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.6); }

  .badges {
    display: flex; justify-content: center; gap: 5px; margin-top: 10px; flex-wrap: wrap;
  }
  .badge {
    background: rgba(255,255,255,.1); color: rgba(255,255,255,.9);
    border: .5px solid rgba(255,255,255,.28);
    font-size: clamp(.56rem, 1.9vw, .64rem);
    padding: 3px 9px; border-radius: 99px; letter-spacing: .02em;
  }

  /* ── Burst ── */
  .burst {
    position: fixed; pointer-events: none; z-index: 100;
    font-size: 22px; animation: burstUp 1s ease forwards;
  }
  @keyframes burstUp {
    0%  { opacity: 1; transform: translate(-50%,-50%) scale(.5); }
    60% { opacity: 1; transform: translate(-50%,-110%) scale(1.2); }
    100%{ opacity: 0; transform: translate(-50%,-170%) scale(.9); }
  }

  /* ── Very small screens (e.g. 360×640) ── */
  @media (max-height: 650px) and (max-width: 600px) {
    .card { padding: 18px 18px 14px; }
    .icon-top { width: 38px; height: 38px; margin-bottom: 8px; }
    h1 { font-size: 1.3rem; }
    .subtitle { margin-bottom: 7px; }
    .divider { margin-bottom: 7px; }
    .message { margin-bottom: 10px; line-height: 1.65; }
    .badges { margin-top: 8px; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="portrait-frame" id="frame">
    <div class="carousel-track" id="carouselTrack"></div>
    <div class="carousel-overlay"></div>
    <div class="bubbles"  id="bubbles"></div>
    <div class="floaters" id="floaters"></div>

    <button class="swipe-arrow left"  id="prevBtn" aria-label="Previous">&#8249;</button>
    <button class="swipe-arrow right" id="nextBtn"  aria-label="Next">&#8250;</button>
    <div class="slide-counter" id="slideCounter">1 / 3</div>
    <div class="dot-bar" id="dotBar"></div>

    <div class="card-wrap">
      <div class="card">
        <div class="icon-top" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <h1>Get Well Soon Bae!</h1>
        <p class="subtitle">a little cheer, just for you</p>
        <div class="divider"></div>
        <p class="message" id="mainMsg">
          Think of this as the universe giving you<br>
          a gentle pause — so you can come back<br>
          <em>stronger than ever.</em><br><br>
          Sending you warm digital hugs! 💗
        </p>
        <div class="btn-group">
          <button class="hug-btn"     onclick="sendHug(event)">💌 Send a Digital Hug</button>
          <button class="outline-btn" onclick="showMsg()">✨ Click meeee</button>
        </div>
        <div class="badges">
          <span class="badge">Feel better soon</span>
          <span class="badge">I love you always</span>
          <span class="badge">Call me Btw</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// VIEWPORT FIX — defeats Chrome Android address-bar gap
// Strategy: use window.innerHeight in pixels, not vh units.
// ════════════════════════════════════════════════════════════
const stage = document.getElementById('stage');
const frame = document.getElementById('frame');
const MOBILE_BP = 600;

function isMobile() { return window.innerWidth < MOBILE_BP; }

function resize() {
  if (!isMobile()) {
    // Desktop: let CSS handle it, remove inline styles
    stage.style.cssText = '';
    frame.style.cssText = '';
    return;
  }
  // Mobile: override everything with actual pixel values
  const W = window.innerWidth;
  const H = window.innerHeight;
  // Force html/body to exact size
  document.documentElement.style.cssText = `width:${W}px;height:${H}px;overflow:hidden`;
  document.body.style.cssText           = `width:${W}px;height:${H}px;overflow:hidden`;
  stage.style.cssText = `position:fixed;top:0;left:0;width:${W}px;height:${H}px;overflow:hidden`;
  frame.style.cssText = `width:${W}px;height:${H}px`;
}

resize();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 150);
});
window.addEventListener('orientationchange', () => setTimeout(resize, 400));

// Also fire after fonts/images load (sometimes changes layout)
window.addEventListener('load', () => setTimeout(resize, 100));

// ════════════════════════════════════════════════════════════
// IMAGE CONFIG — put your filenames here
// ════════════════════════════════════════════════════════════
const BG_IMAGES = [
  "WhatsApp Image 2026-05-16 at 00.46.47.jpeg",
  "WhatsApp Image 2026-05-16 at 00.46.48 (1).jpeg",
  "WhatsApp Image 2026-05-16 at 00.46.48.jpeg",
  "WhatsApp Image 2026-05-16 at 00.46.49 (1).jpeg",
  "WhatsApp Image 2026-05-16 at 00.46.49.jpeg",
  "WhatsApp Image 2026-05-16 at 00.48.03 (1).jpeg",
  "WhatsApp Image 2026-05-16 at 00.48.03.jpeg",
  "WhatsApp Image 2026-05-16 at 00.48.04 (1).jpeg",
  "WhatsApp Image 2026-05-16 at 00.48.04 (2).jpeg",
  "WhatsApp Image 2026-05-16 at 00.48.04.jpeg",
  "WhatsApp Image 2026-05-16 at 00.48.05.jpeg"
];

// ════════════════════════════════════════════════════════════
// CAROUSEL SETUP
// ════════════════════════════════════════════════════════════
const track   = document.getElementById('carouselTrack');
const dotBar  = document.getElementById('dotBar');
const counter = document.getElementById('slideCounter');
const DEFAULTS = ['slide-1','slide-2','slide-3'];
const sources  = BG_IMAGES.length ? BG_IMAGES : DEFAULTS;

sources.forEach(src => {
  const div = document.createElement('div');
  div.className = 'carousel-slide';
  if (src.startsWith('slide-')) {
    div.classList.add(src);
    const pat = document.createElement('div');
    pat.className = 'slide-pattern';
    div.appendChild(pat);
  } else {
    // encode each path segment to handle spaces & parentheses
    const encoded = src.split('/').map(encodeURIComponent).join('/');
    div.style.backgroundImage = `url('${encoded}')`;
  }
  track.appendChild(div);
});

const total = sources.length;
let current = 0, autoTimer = null;

function buildDots() {
  dotBar.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const b = document.createElement('button');
    b.className = 'dot' + (i === current ? ' active' : '');
    b.setAttribute('aria-label', 'Slide '+(i+1));
    const idx = i;
    b.onclick = () => { goTo(idx); resetAuto(); };
    dotBar.appendChild(b);
  }
}

function updateUI() {
  track.style.transform = `translateX(-${current*100}%)`;
  counter.textContent   = `${current+1} / ${total}`;
  buildDots();
}

function goTo(idx) {
  current = ((idx % total) + total) % total;
  updateUI();
}

function resetAuto() {
  clearInterval(autoTimer);
  if (total > 1) autoTimer = setInterval(() => goTo(current+1), 5000);
}

document.getElementById('prevBtn').onclick = () => { goTo(current-1); resetAuto(); };
document.getElementById('nextBtn').onclick = () => { goTo(current+1); resetAuto(); };
updateUI(); resetAuto();

// ─── Touch swipe ─────────────────────────────────────────
let tx=0, ty=0, drag=false;
track.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; drag=true; }, {passive:true});
track.addEventListener('touchmove',  e => {
  if (!drag) return;
  const dx = e.touches[0].clientX - tx;
  const dy = e.touches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) {
    const pct = -(current*100) + (dx/frame.offsetWidth)*100;
    track.style.transition = 'none';
    track.style.transform  = `translateX(${pct}%)`;
  }
}, {passive:true});
track.addEventListener('touchend', e => {
  if (!drag) return; drag=false; track.style.transition='';
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) { dx<0 ? goTo(current+1) : goTo(current-1); resetAuto(); } else updateUI();
});

// ─── Mouse drag ──────────────────────────────────────────
let mx=0, mDrag=false;
track.addEventListener('mousedown', e => { mx=e.clientX; mDrag=true; track.style.cursor='grabbing'; });
window.addEventListener('mousemove', e => {
  if (!mDrag) return;
  const pct = -(current*100) + ((e.clientX-mx)/frame.offsetWidth)*100;
  track.style.transition='none'; track.style.transform=`translateX(${pct}%)`;
});
window.addEventListener('mouseup', e => {
  if (!mDrag) return; mDrag=false; track.style.cursor=''; track.style.transition='';
  const dx = e.clientX-mx;
  if (Math.abs(dx)>40) { dx<0?goTo(current+1):goTo(current-1); resetAuto(); } else updateUI();
});

// ─── Messages ────────────────────────────────────────────
const msgs = [
  "Your body is working hard — give it time. 💗",
  "Every day is a small step toward recovery. ✨",
  "Rest now; the universe is handling the rest. 🌸",
  "You're stronger than you know. 💪",
  "I'm right here, always. Get well soon! 🫂",
  "Healing takes courage. You have plenty of it. 🌟",
  "Today's rest is tomorrow's strength. 💖"
];
let msgIdx=0;
function showMsg(){
  const p=document.getElementById('mainMsg');
  p.style.opacity=0;
  setTimeout(()=>{ p.innerHTML=msgs[msgIdx%msgs.length]; p.style.transition='opacity .4s'; p.style.opacity=1; msgIdx++; },300);
}

// ─── Hug burst ───────────────────────────────────────────
function sendHug(e){
  const icons=['💗','🤗','💌','✨','🌸','💖','🌷','💕'];
  for(let i=0;i<8;i++) setTimeout(()=>{
    const d=document.createElement('div'); d.className='burst';
    d.textContent=icons[Math.floor(Math.random()*icons.length)];
    d.style.left=(e.clientX+(Math.random()-.5)*100)+'px';
    d.style.top =(e.clientY+(Math.random()-.5)*45)+'px';
    document.body.appendChild(d); setTimeout(()=>d.remove(),1100);
  },i*85);
}

// ─── Bubbles & floaters ──────────────────────────────────
const bColors=['#f48fb1','#e91e8c','#fce4ec','#f8bbd0','#c2185b'];
const bc=document.getElementById('bubbles');
for(let i=0;i<12;i++){
  const b=document.createElement('div'); b.className='bubble';
  const sz=14+Math.random()*44;
  Object.assign(b.style,{ width:sz+'px',height:sz+'px',background:bColors[i%bColors.length],
    left:(Math.random()*100)+'%', animationDuration:(12+Math.random()*13)+'s', animationDelay:-(Math.random()*14)+'s' });
  bc.appendChild(b);
}
const flowers=['🌸','🌺','🌷','💗','💕','🌸','💖'];
const fl=document.getElementById('floaters');
for(let i=0;i<10;i++){
  const f=document.createElement('div'); f.className='floater';
  f.textContent=flowers[i%flowers.length];
  Object.assign(f.style,{ left:(Math.random()*100)+'%', top:(Math.random()*100)+'%',
    fontSize:(18+Math.random()*20)+'px', animationDuration:(9+Math.random()*12)+'s',
    animationDelay:-(Math.random()*10)+'s', opacity:(.07+Math.random()*.12).toFixed(2) });
  fl.appendChild(f);
}
</script>
</body>
</html>
