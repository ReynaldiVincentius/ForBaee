<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Get Well Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: #1a0714;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0714;
  }

  /* 3:4 portrait frame */
  .portrait-frame {
    position: relative;
    width: min(100vw, 75vh);
    height: min(133.33vw, 100vh);
    overflow: hidden;
  }

  /* Swipeable track */
  .carousel-track {
    position: absolute;
    inset: 0;
    display: flex;
    transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
    touch-action: pan-y;
  }

  .carousel-slide {
    flex: 0 0 100%;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .slide-1 { background: linear-gradient(160deg, #2e0a1e 0%, #7a1f4a 45%, #c2185b 80%, #e91e8c 100%); }
  .slide-2 { background: linear-gradient(160deg, #1a0714 0%, #5c1238 40%, #9c2762 75%, #c2185b 100%); }
  .slide-3 { background: linear-gradient(160deg, #120510 0%, #4a0e30 45%, #8b1a55 80%, #d81b7a 100%); }

  .slide-pattern {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(235,133,183,0.14) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(194,24,91,0.18) 0%, transparent 50%),
      radial-gradient(circle at 50% 10%, rgba(240,214,228,0.09) 0%, transparent 40%);
    pointer-events: none;
  }

  .carousel-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(170deg,
      rgba(38,5,22,0.3) 0%,
      rgba(72,8,40,0.18) 45%,
      rgba(38,5,22,0.35) 100%
    );
    pointer-events: none;
    z-index: 2;
  }

  .swipe-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, opacity 0.2s;
    opacity: 0.7;
    user-select: none;
  }
  .swipe-arrow:hover { background: rgba(255,255,255,0.2); opacity: 1; }
  .swipe-arrow.left  { left: 12px; }
  .swipe-arrow.right { right: 12px; }

  .dot-bar {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.32);
    border: none;
    cursor: pointer;
    transition: background 0.3s, width 0.3s;
    padding: 0;
  }
  .dot.active {
    background: rgba(255,255,255,0.92);
    width: 20px;
  }

  .slide-counter {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.8);
    font-size: 0.72rem;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 10px;
    border-radius: 99px;
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
  }

  .floaters {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    overflow: hidden;
  }
  .floater {
    position: absolute;
    animation: floatRotate linear infinite;
    opacity: 0.13;
  }
  @keyframes floatRotate {
    0%   { transform: rotate(0deg) translateY(0); }
    25%  { transform: rotate(90deg) translateY(-14px); }
    50%  { transform: rotate(180deg) translateY(0); }
    75%  { transform: rotate(270deg) translateY(14px); }
    100% { transform: rotate(360deg) translateY(0); }
  }

  .bubbles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110%) scale(0.6); opacity: 0; }
    10%  { opacity: 0.16; }
    90%  { opacity: 0.07; }
    100% { transform: translateY(-80px) scale(1); opacity: 0; }
  }

  .card-wrap {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    pointer-events: none;
  }

  .card {
    pointer-events: all;
    width: 100%;
    max-width: 320px;
    background: transparent;
    border: 1px solid rgba(235,133,183,0.35);
    border-radius: 24px;
    padding: 34px 28px 28px;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    text-align: center;
    animation: fadeIn 0.9s ease both;
    box-shadow: none;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .icon-top {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(145deg, #9c2762, #e91e8c);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    animation: pulse 3s ease-in-out infinite;
    box-shadow: 0 4px 18px rgba(194,24,91,0.4);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 18px rgba(194,24,91,0.4); }
    50%       { transform: scale(1.07); box-shadow: 0 4px 26px rgba(194,24,91,0.65); }
  }
  .icon-top svg { width: 26px; height: 26px; fill: #ffffff; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #ffffff;
    margin-bottom: 3px;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
    margin-bottom: 18px;
  }
  .message {
    font-size: 0.88rem;
    line-height: 1.85;
    color: rgba(255,255,255,0.92);
    font-weight: 300;
    margin-bottom: 22px;
    transition: opacity 0.4s;
  }
  .message em {
    color: #ffffff;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-weight: 400;
  }
  .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
  }
  .hug-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, #9c2762, #e91e8c);
    color: #fce4ec;
    border: none;
    border-radius: 50px;
    padding: 11px 26px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    min-height: 44px;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(194,24,91,0.45);
  }
  .hug-btn:hover  { opacity: 0.88; }
  .hug-btn:active { transform: scale(0.97); }

  .outline-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: transparent;
    color: rgba(255,255,255,0.9);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 50px;
    padding: 9px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    cursor: pointer;
    min-height: 38px;
    transition: background 0.2s, border-color 0.2s;
  }
  .outline-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.65);
  }

  .badges {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .badge {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9);
    border: 0.5px solid rgba(255,255,255,0.28);
    font-size: 0.68rem;
    font-weight: 400;
    padding: 4px 10px;
    border-radius: 99px;
    letter-spacing: 0.02em;
  }

  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 22px;
    animation: burstUp 1s ease forwards;
  }
  @keyframes burstUp {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
    60%  { opacity: 1; transform: translate(-50%,-110%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%,-170%) scale(0.9); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="portrait-frame" id="portraitFrame">

    <div class="carousel-track" id="carouselTrack"></div>

    <div class="carousel-overlay"></div>
    <div class="bubbles"  id="bubbles"></div>
    <div class="floaters" id="floaters"></div>

    <button class="swipe-arrow left"  id="prevBtn" aria-label="Previous">&#8249;</button>
    <button class="swipe-arrow right" id="nextBtn"  aria-label="Next">&#8250;</button>

    <div class="slide-counter" id="slideCounter">1 / 3</div>
    <div class="dot-bar" id="dotBar"></div>

    <div class="card-wrap">
      <div class="card">
        <div class="icon-top" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
        <h1>Get Well Soon Bae!</h1>
        <p class="subtitle">a little cheer, just for you</p>
        <div class="divider"></div>
        <p class="message" id="mainMsg">
          Think of this as the universe giving you<br>
          a gentle pause — so you can come back<br>
          <em>stronger than ever.</em><br><br>
          Sending you warm digital hugs! 💗
        </p>
        <div class="btn-group">
          <button class="hug-btn" onclick="sendHug(event)">
            <span>💌</span> Send a Digital Hug
          </button>
          <button class="outline-btn" onclick="showMsg()">
            <span>✨</span> Click meeee
          </button>
        </div>
        <div class="badges">
          <span class="badge">Feel better soon</span>
          <span class="badge">I love you always</span>
          <span class="badge">Call me Btw</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   ▼▼▼  ADD YOUR BACKGROUND IMAGES HERE  ▼▼▼
   Put your image file paths or URLs inside the array.

   Examples:
     "images/photo1.jpg"
     "backgrounds/beach.png"
     "https://example.com/flower.jpg"

   Leave empty ([]) to use the default blue gradient slides.
═══════════════════════════════════════════════════════════ */
const BG_IMAGES = [
  "WhatsApp Image 2026-05-16 at 00.46.47.jpeg",
   "WhatsApp Image 2026-05-16 at 00.46.48 (1).jpeg",
   "WhatsApp Image 2026-05-16 at 00.46.48.jpeg",
   "WhatsApp Image 2026-05-16 at 00.46.49 (1).jpeg",
   "WhatsApp Image 2026-05-16 at 00.46.49.jpeg",
   "WhatsApp Image 2026-05-16 at 00.48.03 (1).jpeg",
   "WhatsApp Image 2026-05-16 at 00.48.03.jpeg",
   "WhatsApp Image 2026-05-16 at 00.48.04 (1).jpeg",
   "WhatsApp Image 2026-05-16 at 00.48.04 (2).jpeg",
   "WhatsApp Image 2026-05-16 at 00.48.04.jpeg",
   "WhatsApp Image 2026-05-16 at 00.48.05.jpeg"
];
/* ▲▲▲  END OF IMAGE CONFIG  ▲▲▲ */

const track   = document.getElementById('carouselTrack');
const dotBar  = document.getElementById('dotBar');
const counter = document.getElementById('slideCounter');

const DEFAULTS = ['slide-1','slide-2','slide-3'];
const sources  = BG_IMAGES.length ? BG_IMAGES : DEFAULTS;

sources.forEach(s => {
  const div = document.createElement('div');
  div.className = 'carousel-slide';
  if (s.startsWith('slide-')) {
    div.classList.add(s);
    const pat = document.createElement('div');
    pat.className = 'slide-pattern';
    div.appendChild(pat);
  } else {
    div.style.backgroundImage = `url('${s}')`;
  }
  track.appendChild(div);
});

const total = sources.length;
let current = 0, autoTimer = null;

function buildDots() {
  dotBar.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const btn = document.createElement('button');
    btn.className = 'dot' + (i === current ? ' active' : '');
    btn.setAttribute('aria-label', 'Slide ' + (i+1));
    const idx = i;
    btn.onclick = () => { goTo(idx); resetAuto(); };
    dotBar.appendChild(btn);
  }
}

function updateUI() {
  track.style.transform = `translateX(-${current * 100}%)`;
  counter.textContent   = `${current + 1} / ${total}`;
  buildDots();
}

function goTo(idx) {
  current = ((idx % total) + total) % total;
  updateUI();
}

function resetAuto() {
  clearInterval(autoTimer);
  if (total > 1) autoTimer = setInterval(() => goTo(current + 1), 5000);
}

document.getElementById('prevBtn').onclick = () => { goTo(current - 1); resetAuto(); };
document.getElementById('nextBtn').onclick = () => { goTo(current + 1); resetAuto(); };

updateUI();
resetAuto();

/* Touch swipe */
let tx = 0, isDrag = false;

track.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  isDrag = true;
}, { passive: true });

track.addEventListener('touchmove', e => {
  if (!isDrag) return;
  const dx = e.touches[0].clientX - tx;
  const dy = e.touches[0].clientY - e.touches[0].clientY;
  if (Math.abs(dx) > 5) {
    const pct = -(current * 100) + (dx / track.parentElement.offsetWidth) * 100;
    track.style.transition = 'none';
    track.style.transform = `translateX(${pct}%)`;
  }
}, { passive: true });

track.addEventListener('touchend', e => {
  if (!isDrag) return;
  isDrag = false;
  track.style.transition = '';
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) { dx < 0 ? goTo(current+1) : goTo(current-1); resetAuto(); }
  else updateUI();
});

/* Mouse drag */
let mx = 0, mDrag = false;
track.addEventListener('mousedown', e => { mx = e.clientX; mDrag = true; track.style.cursor = 'grabbing'; });
window.addEventListener('mousemove', e => {
  if (!mDrag) return;
  const pct = -(current * 100) + ((e.clientX - mx) / track.parentElement.offsetWidth) * 100;
  track.style.transition = 'none';
  track.style.transform = `translateX(${pct}%)`;
});
window.addEventListener('mouseup', e => {
  if (!mDrag) return;
  mDrag = false; track.style.cursor = ''; track.style.transition = '';
  const dx = e.clientX - mx;
  if (Math.abs(dx) > 40) { dx < 0 ? goTo(current+1) : goTo(current-1); resetAuto(); }
  else updateUI();
});

/* Messages */
const msgs = [
  "Your body is working hard — give it time. 💗",
  "Every day is a small step toward recovery. ✨",
  "Rest now; the universe is handling the rest. 🌸",
  "You're stronger than you know. 💪",
  "I'm right here, always. Get well soon! 🫂",
  "Healing takes courage. You have plenty of it. 🌟",
  "Today's rest is tomorrow's strength. 💖"
];
let msgIdx = 0;
function showMsg() {
  const p = document.getElementById('mainMsg');
  p.style.opacity = 0;
  setTimeout(() => {
    p.innerHTML = msgs[msgIdx % msgs.length];
    p.style.transition = 'opacity 0.4s';
    p.style.opacity = 1;
    msgIdx++;
  }, 300);
}

/* Hug burst */
function sendHug(e) {
  const icons = ['💗','🤗','💌','✨','🌸','💖','🌷','💕'];
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'burst';
      d.textContent = icons[Math.floor(Math.random() * icons.length)];
      d.style.left = (e.clientX + (Math.random()-0.5)*100) + 'px';
      d.style.top  = (e.clientY + (Math.random()-0.5)*45)  + 'px';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 1100);
    }, i * 85);
  }
}

/* Bubbles */
const bubbleColors = ['#f48fb1','#e91e8c','#fce4ec','#f8bbd0','#c2185b'];
const bc = document.getElementById('bubbles');
for (let i = 0; i < 12; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const sz = 14 + Math.random() * 44;
  Object.assign(b.style, {
    width: sz+'px', height: sz+'px',
    background: bubbleColors[i % bubbleColors.length],
    left: (Math.random()*100)+'%',
    animationDuration: (12 + Math.random()*13)+'s',
    animationDelay: -(Math.random()*14)+'s'
  });
  bc.appendChild(b);
}

/* Floaters */
const flowers = ['🌸','🌺','🌷','💗','💕','🌸','💖'];
const fl = document.getElementById('floaters');
for (let i = 0; i < 10; i++) {
  const f = document.createElement('div');
  f.className = 'floater';
  f.textContent = flowers[i % flowers.length];
  Object.assign(f.style, {
    left: (Math.random()*100)+'%', top: (Math.random()*100)+'%',
    fontSize: (18 + Math.random()*20)+'px',
    animationDuration: (9 + Math.random()*12)+'s',
    animationDelay: -(Math.random()*10)+'s',
    opacity: (0.07 + Math.random()*0.12).toFixed(2)
  });
  fl.appendChild(f);
}
</script>
</body>
</html>
